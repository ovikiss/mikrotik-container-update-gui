<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MikroTik Container Update GUI</title>
    <link rel="stylesheet" id="themeStyleCss" href="/styles-modern.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>MikroTik Container Update GUI</h1>
          <p class="subtitle">Auto-discovers all containers from RouterOS REST API</p>
        </div>
        <div class="controls">
          <label class="control" for="themeStyleSelect">
            <span>Theme</span>
            <div class="theme-dropdown" id="themeStyleDropdown">
              <button
                type="button"
                class="theme-toggle"
                id="themeStyleToggle"
                aria-haspopup="listbox"
                aria-expanded="false"
              >
                <img src="/images/ui/theme-style.svg" alt="" />
                <span id="themeStyleCurrentLabel">Modern</span>
              </button>
              <div class="theme-menu" id="themeStyleMenu" role="listbox" aria-label="Theme style options"></div>
              <select id="themeStyleSelect" class="sr-only" tabindex="-1" aria-hidden="true">
                <option value="modern">Modern</option>
                <option value="classic">Classic</option>
              </select>
            </div>
          </label>

          <label class="control" for="themeSelect">
            <span>Style</span>
            <div class="theme-dropdown" id="themeDropdown">
              <button
                type="button"
                class="theme-toggle"
                id="themeToggle"
                aria-haspopup="listbox"
                aria-expanded="false"
              >
                <img id="themeCurrentIcon" src="/images/ui/theme-light.svg" alt="" />
                <span id="themeCurrentLabel">Light</span>
              </button>
              <div class="theme-menu" id="themeMenu" role="listbox" aria-label="Theme options"></div>
              <select id="themeSelect" class="sr-only" tabindex="-1" aria-hidden="true">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
              </select>
            </div>
          </label>

          <button id="refreshBtn" class="btn">Refresh</button>
        </div>
      </header>

      <section class="panel">
        <div class="status-row">
          <span id="connectionBadge" class="badge">Checking connection...</span>
          <span id="countLabel"></span>
        </div>

        <div class="toolbar">
          <button class="btn ghost" data-bulk-action="check">Check selected/all</button>
          <button class="btn" data-bulk-action="update">Update selected/all</button>
          <button class="btn danger" data-bulk-action="rollback">Rollback selected/all</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th><input id="selectAll" type="checkbox" /></th>
                <th>Name</th>
                <th>ID</th>
                <th>Status</th>
                <th>Update</th>
                <th>Image</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="containersBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>Activity</h2>
        <pre id="logBox" class="log-box"></pre>
      </section>
    </main>

    <template id="rowTemplate">
      <tr>
        <td><input class="row-select" type="checkbox" /></td>
        <td data-col="name"></td>
        <td data-col="id"></td>
        <td><span data-col="status" class="status-pill"></span></td>
        <td><span data-col="updateState" class="update-pill">unchecked</span></td>
        <td data-col="image" class="mono"></td>
        <td>
          <div class="row-actions">
            <button class="btn tiny ghost" data-action="check">Check</button>
            <button class="btn tiny" data-action="update">Update</button>
            <button class="btn tiny danger" data-action="rollback">Rollback</button>
          </div>
        </td>
      </tr>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
