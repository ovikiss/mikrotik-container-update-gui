<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" id="theme-style-css" href="/styles-modern.css" />
  </head>
  <body>
    <div class="dashboard-container app">
      <header class="topbar" data-mikrotik-header-root></header>

      <section class="panel">
        <div class="status-row">
          <span id="connectionBadge" class="badge">Checking connection...</span>
          <span id="countLabel"></span>
        </div>

        <div class="toolbar">
          <button class="btn ghost" id="bulkCheckButton" data-bulk-action="check"></button>
          <button class="btn bulk-update-btn" data-bulk-action="update">
            <span class="bulk-update-icon" aria-hidden="true"></span>
            <span class="bulk-update-label" id="bulkUpdateLabel"></span>
          </button>
        </div>

        <div class="table-wrap">
          <table class="data-table containers-table">
            <thead>
              <tr>
                <th><input id="selectAll" type="checkbox" /></th>
                <th id="headerName"></th>
                <th id="headerId"></th>
                <th id="headerStatus"></th>
                <th id="headerUpdate"></th>
                <th id="headerImage"></th>
                <th id="headerActions"></th>
              </tr>
            </thead>
            <tbody id="containersBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2 id="activityTitle"></h2>
        <div class="table-wrap activity-wrap">
          <table class="data-table activity-table">
            <thead>
              <tr>
                <th id="activityTimeHeader"></th>
                <th id="activityEventHeader"></th>
                <th id="activityDetailsHeader"></th>
              </tr>
            </thead>
            <tbody id="logBox"></tbody>
          </table>
        </div>
      </section>
    </div>

    <template id="rowTemplate">
      <tr>
        <td><input class="row-select" type="checkbox" /></td>
        <td data-col="name"></td>
        <td data-col="id"></td>
        <td><span data-col="status" class="status-pill"></span></td>
        <td><span data-col="updateState" class="update-pill"></span></td>
        <td data-col="image" class="mono"></td>
        <td>
          <div class="row-actions">
            <button class="btn tiny ghost" data-action="check">Check</button>
            <button class="btn tiny" data-action="update">Update</button>
            <select class="rollback-select" data-role="rollback-select"></select>
            <button class="btn tiny danger" data-action="rollback">Rollback</button>
          </div>
        </td>
      </tr>
    </template>

    <script src="common/header.js"></script>
    <script src="common/dropdown-utils.js"></script>
    <script src="/app.js" defer></script>
  </body>
</html>
