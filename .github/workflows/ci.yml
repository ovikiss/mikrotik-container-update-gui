name: ci

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate install helper syntax
        run: |
          bash -n scripts/install-to-router.sh

      - name: Validate Python sources
        run: |
          python3 -m py_compile src/server.py src/routeros_client.py

      - name: Validate Docker build
        run: |
          docker build -t mcug-ci-test .
